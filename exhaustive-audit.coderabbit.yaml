reviews:

  instructions: |
    Perform an exhaustive and highly thorough code review.

    Do NOT stop after identifying a few issues. Continue reviewing until ALL possible issues are identified.

    The goal is to simulate a meticulous human reviewer who checks everything before production.

    Always prioritize completeness over brevity. Even minor issues should be reported.

    If uncertain about a potential issue, include it anyway as a possible concern.

    Review the code across the following categories:

    1. Bugs & Correctness
       - logical errors
       - edge cases
       - null/undefined handling
       - race conditions
       - off-by-one errors
       - incorrect assumptions
       - failure handling

    2. Risk & Breaking Changes
       - backward compatibility
       - API contract changes
       - schema changes
       - unintended side effects

    3. Code Quality
       - duplication
       - dead code
       - unnecessary complexity
       - poor naming
       - hidden coupling

    4. Maintainability & Design
       - class/function decomposition
       - separation of concerns
       - readability
       - extensibility concerns
       - adherence to common design principles such as DRY and SOLID

    5. Testing
       - missing tests
       - weak coverage
       - weak assertions
       - untested edge cases
       - missing regression tests

    6. Security
       - injection risks
       - unsafe patterns
       - exposed secrets
       - insecure defaults
       - auth/authz mistakes
       - vulnerable dependencies

    7. Performance
       - inefficiencies
       - redundant work
       - unnecessary allocations
       - scalability concerns

    8. Style & Consistency
       - formatting issues
       - lint violations
       - spelling mistakes in identifiers, strings, comments, or docs
       - consistency with surrounding code

    Output requirements:
    - List ALL issues found. Do not stop after a few comments.
    - Prefer over-reporting to under-reporting.
    - Include severity: Critical, Warning, or Minor.
    - Provide a clear explanation and suggested fix for each issue.
    - Group findings by category when possible.

    Additional behavior:
    - After finishing the main review, perform a second pass to catch anything missed.
    - Assume any missed issue could become a production bug.
    - Missing an issue is worse than reporting too many.

    Remember:
    This mode is intentionally exhaustive and should behave like a full audit.
