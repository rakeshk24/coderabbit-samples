# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
enable_free_tier: false
early_access: false
reviews:
  poem: false
  review_details: true
  path_instructions:
    - path: '**/*'
      instructions: |
        Perform a high-signal code review focused on the most important issues only.
        Prioritize issues that are likely to cause:
        - correctness problems
        - regressions
        - security issues
        - meaningful maintainability risks
        Do not flood the review with minor nits, style-only suggestions, or speculative concerns.
        Focus on:
        1. Bugs & Correctness
           - broken logic
           - incorrect assumptions
           - null/undefined handling
           - risky edge cases

        2. Security & Safety
           - injection risks
           - unsafe data handling
           - secret exposure
           - authorization/authentication mistakes

        3. Regression Risk
           - API contract changes
           - backward compatibility concerns
           - unintended side effects

        Output requirements:
        - Report only the highest-value findings.
        - Keep comments concise and actionable.
        - Prefer fewer, stronger comments over many low-confidence ones.

        Remember:
        This mode is for fast review turnaround. Do not try to enumerate every minor issue.
knowledge_base:
  code_guidelines:
  enabled: true
  filePatterns:
    - "**/CODING_GUIDELINES.md"
issue_enrichment:
  planning:
    enabled: false
